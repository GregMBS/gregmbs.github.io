# Google Analytics
analytics:
  provider: google-gtag
  google:
    tracking_id: G-WN4ZS6ZCKF
    anonymize_ip: false

# Comments (Disqus — set shortname if/when you have a real one)
comments:
  provider: false
  # provider: disqus
  # disqus:
  #   shortname: your-disqus-shortname

# SASS
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-admin
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-include-cache

# Permalink
permalink: "project/:title"

# Compress
compress_html:
  clippings: all

# Defaults
defaults:
  # Posts
  - scope:
      path: ''
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true
  # Pages
  - scope:
      path: ''
      type: pages
    values:
      layout: single
      author_profile: false

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/