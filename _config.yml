# Minimal Mistakes
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: contrast

markdown: kramdown

# Site
url: ''
baseurl: ''

title: GMBS Consulting
title_separator: "|"
subtitle: Precision Geospatial Analysis, Statistical Modeling, and Political Consulting
description: Precision Geospatial Analysis, Statistical Modeling, and Political Consulting
logo: '/assets/images/logo.png'

# Social sharing / SEO
og_image: '/assets/images/cropped-wordcloud.png'

# Author
author:
  name: Greg Blumenthal
  avatar: '/assets/images/GMB.png'
  bio: >
    Gregory M. Blumenthal, PhD, obtained his B.A. in Chemistry from Vanderbilt
    University and his doctorate in Pharmacology from Duke University. He has
    produced a body of work of enormous depth and breadth, encompassing research
    in toxicology, risk analysis, secure financial web applications, and other
    data science projects for such agencies as NIH, EPA, the VA, and NASA (from
    whom he received an award in 2014). His presentation developing objective
    criteria for PBPK models was expanded into the 2006 US EPA criteria for
    application of PBPK models to risk assessment. His specific contributions to
    the realm of statistical analysis continue to influence scientific analysis
    to this day. The August 2018 US FDA Guidance for acceptance of PBPK models
    in support of drug evaluations was based upon this US EPA document.
    Dr. Blumenthal's strongest area of expertise is data science and data
    analysis, providing quantitative evaluation and GIS consulting services to
    Memphis-area nonprofits, government agencies, and political campaigns.
  location: Memphis, TN
  email: calldrpc@gmbs-consulting.com
  links:
    - label: Email
      icon: fas fa-fw fa-envelope-square
      url: mailto:calldrpc@gmbs-consulting.com
    - label: GitHub
      icon: fab fa-fw fa-github
      url: https://github.com/GregMBS
    - label: LinkedIn
      icon: fab fa-fw fa-linkedin
      url: https://www.linkedin.com/in/gm-blumenthal-scharf
    - label: Facebook
      icon: fab fa-fw fa-facebook-square
      url: https://www.facebook.com/gblumenthalscharf
    - label: Messenger
      icon: fab fa-fw fa-facebook-messenger
      url: https://m.me/gblumenthalscharf

